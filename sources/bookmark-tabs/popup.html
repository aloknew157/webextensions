<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bookmark Tabs</title>
  <style>
    body {
      background: lightgray;
    }
    #postfix {
      width: 100%;
    }
    .select-wrapper {
      position: relative;
      width: 100%;
      display: inline-block;
    }
    #saveFolder {
      width: 100%;
      height: 24px;
      background: white;
      color: black;
      border: 1px solid #a0a0a0;
      border-radius: 3px;
      box-sizing: border-box;
      padding: 0 20px 0 4px;
      font-family: Arial, sans-serif;
      font-size: 13.3px;
    }
    #saveFolderLabel {
      position: absolute;
      top: 1px;
      left: 1px;
      height: 22px;
      width: calc(100% - 20px);
      background: white;
      color: black;
      pointer-events: none;
      display: flex;
      align-items: center;
      padding-left: 4px;
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13.3px;
      font-family: Arial, sans-serif;
      border-radius: 2px 0 0 2px;
    }

    #savebtn {
      float: right;
    }
    #closeAfterSave {
    }
  </style>
</head>
<body>
  <small>
    <fieldset>
      <b>Save folder postfix title</b>
      <p>
        <input
          type="text"
          id="postfix"
          placeholder="Tabs Group Name / ID / Keywords"
          autofocus
        />
      </p>
    </fieldset>

    <fieldset>
      <legend>⚠️Persistent options</legend>
      <b>Base Save Folder</b>
      <div class="select-wrapper">
        <span id="saveFolderLabel"></span>
        <select id="saveFolder"></select>
      </div>
      <br /><br />

      <b>Close Tabs After Save?</b>
      <input type="checkbox" id="closeAfterSave" />
      <br /><br />
      <b>Show Mobile Bookmarks?</b>
      <input type="checkbox" id="showMobileBookmarks" />
    </fieldset>

    <fieldset>
      <b>No timestamp subfolder?</b>
      <input type="checkbox" id="noTimestampSubfolder" />
    </fieldset>

    <fieldset>
      <button id="savebtn"><b>Bookmark Tabs!</b></button>
    </fieldset>

    <fieldset>
      <b>Hint:</b>
      <br />
      - enable notification via optional permissions
      <br />
      - use the custom shortcut, to skip this popup
    </fieldset>
  </small>

  <script src="popup.js"></script>
</body>
</html>
